<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudyFlow — Buat jalur belajar terstruktur dengan AI">
    <title>StudyFlow — Buat Roadmap Belajar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                <span class="logo-text">StudyFlow</span>
            </a>
            <div class="navbar-actions">
                <button class="lang-toggle" id="langToggle" aria-label="Ganti bahasa">
                    <span class="lang-text">ID</span>
                </button>
                <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <section class="hero" id="hero" style="display: flex; justify-content: center; text-align: center;">
        <div class="container" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="hero-content" style="max-width: 720px; display: flex; flex-direction: column; align-items: center; width: 100%;">


                
                <h1 class="hero-title fade-in" data-i18n="hero_title" style="margin-top: 16px;">
                    <span class="gradient-text">Mau belajar</span> apa hari ini?
                </h1>
                
                <p class="hero-description fade-in" data-i18n="hero_subtitle" style="margin: 24px auto 0;">
                    Masukkan topik yang ingin kamu pelajari, dan kami akan membuatkan alur belajar terstruktur khusus untukmu.
                </p>

                <form id="generatorForm" class="search-form fade-in" style="width: 100%; max-width: 600px; margin-top: 40px; display: flex; flex-direction: column; align-items: center;">
                    <div class="search-input-wrapper" style="position: relative; width: 100%;">
                        <svg class="search-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary);">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="topicInput" data-i18n-placeholder="search_placeholder" placeholder="Contoh: Belajar Next.js, Fisika SMP, UI/UX Design..." required autocomplete="off" style="width: 100%; padding: 20px 20px 20px 56px; border-radius: 100px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 1.0625rem; box-shadow: var(--shadow-sm); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); outline: none;">
                    </div>
                    <style>
                        #topicInput:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(108, 138, 255, 0.15); }
                    </style>
                    <div class="hero-buttons" style="justify-content: center; margin-top: 24px; width: 100%;">
                        <button type="submit" class="btn btn-primary btn-generate btn-lg" style="width: 100%; max-width: 300px; justify-content: center; font-size: 1.1rem; padding: 18px 32px; border-radius: 100px;">
                            <span data-i18n="btn_generate">Buat Roadmap</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </div>
                </form>

                <div class="popular-topics fade-in" style="margin-top: 40px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px;">
                    <span class="popular-label" data-i18n="popular_topics" style="color: var(--text-secondary); font-size: 0.875rem; font-weight: 500;">Populer:</span>
                    <button type="button" class="badge badge-blue topic-suggestion" style="border: none; cursor: pointer; font-size: 0.8125rem; padding: 6px 14px;">Python Dasar</button>
                    <button type="button" class="badge badge-purple topic-suggestion" style="border: none; cursor: pointer; font-size: 0.8125rem; padding: 6px 14px;">UI/UX Design</button>
                    <button type="button" class="badge badge-green topic-suggestion" style="border: none; cursor: pointer; font-size: 0.8125rem; padding: 6px 14px;">Data Science</button>
                    <button type="button" class="badge badge-amber topic-suggestion" style="border: none; cursor: pointer; font-size: 0.8125rem; padding: 6px 14px;">Fisika SMP</button>
                </div>

                <div id="historySection" class="history-section fade-in" style="display:none; margin-top: 32px;">
                    <span class="history-label" data-i18n="recent_topics" style="font-size: 0.875rem; color: var(--text-secondary); font-weight: 500;">Terakhir dicari:</span>
                    <div id="historyList" class="history-list" style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px;"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container text-center text-tertiary" style="font-size: var(--text-sm);">
            <p data-i18n="footer_copy">&copy; 2026 StudyFlow. Dibuat untuk pembelajar.</p>
        </div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/gemini-api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
