<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow — Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/roadmap.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                <span class="logo-text">StudyFlow</span>
            </a>
            <div class="navbar-actions">
                <a href="index.html" class="btn btn-ghost btn-sm" data-i18n="btn_new">Buat Baru</a>
                <button class="lang-toggle" id="langToggle" aria-label="Ganti bahasa">
                    <span class="lang-text">ID</span>
                </button>
                <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 48px; padding-bottom: 80px; min-height: calc(100vh - 64px);">
        <div id="loadingState" class="state-container">
            <div class="loader-spinner"></div>
            <h2 data-i18n="generating">Membuat roadmap...</h2>
            <p class="text-secondary" id="loadingTopic">Memproses topik...</p>
            <p class="text-tertiary" style="font-size:var(--text-sm); margin-top:8px;" data-i18n="generating_wait">Proses ini membutuhkan 15-30 detik</p>
        </div>

        <div id="errorState" class="state-container" style="display:none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <h2 id="errorMessage" style="color:var(--color-error)">Gagal membuat roadmap.</h2>
            <p id="errorDetail" class="text-secondary" style="max-width:400px; margin-top: 8px;"></p>
            <div class="error-actions">
                <button id="retryBtn" class="btn btn-primary" data-i18n="btn_retry">Coba Lagi</button>
                <a href="index.html" class="btn btn-secondary" data-i18n="btn_back">Kembali</a>
            </div>
        </div>

        <div id="roadmapContent" class="roadmap-content" style="display:none; width: 100%; max-width: 860px; margin: 0 auto;"></div>
    </main>

    <style>
        .loader-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 60vh; text-align: center;
            padding: 24px;
        }
        .state-container h2 { font-size: var(--text-xl); margin-bottom: 8px; }
        .error-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }

        /* Filter buttons styling */
        .roadmap-filters {
            display: flex;
            gap: var(--space-2);
            margin: var(--space-4) 0 var(--space-6);
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--space-4);
        }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 16px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .filter-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
            background: rgba(108, 138, 255, 0.05);
        }
        .filter-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #ffffff;
            box-shadow: var(--shadow-sm);
        }

        /* Print button styling */
        .roadmap-header-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-4);
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn-print {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Sidebar improvements */
        .sidebar-section {
            margin-bottom: var(--space-6);
        }
        
        /* Filtering logic styling */
        .roadmap-node.filtered-out {
            display: none !important;
        }
        .node-connector.filtered-out {
            display: none !important;
        }

        /* Sidebar progress indicators */
        .sidebar-item-progress-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-top: 2px;
        }
        
        /* Specific tweaks to fix sidebar on laptops to avoid text overlap */
        @media (min-width: 769px) {
            .roadmap-sidebar {
                width: 280px;
                padding: var(--space-6);
            }
            .sidebar-item {
                max-width: 100%;
                overflow: hidden;
            }
        }
    </style>

    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/gemini-api.js"></script>
    <script src="js/roadmap.js"></script>
</body>
</html>
